<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside style="flex: 0 0 224px; display: flex; flex-direction: column; gap: 4px; padding: 16px 14px; border-right: 1px solid var(--border); background: var(--card); align-self: stretch;">
  <div style="display: flex; align-items: center; gap: 8px; padding: 6px 8px 14px;">
    <span style="font-family: var(--font-mono); font-weight: 600; font-size: 15px;">study<span style="color: var(--brand);">blog</span></span>
    <span style="font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-foreground); border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px;">admin</span>
  </div>

  <a href="#" style="{{ dashStyle }}">
    <span style="{{ dashIconStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg></span>
    <span>Dashboard</span>
  </a>
  <a href="#" style="{{ postsStyle }}">
    <span style="{{ postsIconStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></span>
    <span>Posts</span>
    <span style="margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); background: var(--muted); border-radius: 999px; padding: 1px 7px;">19</span>
  </a>
  <a href="#" style="{{ mediaStyle }}">
    <span style="{{ mediaIconStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></span>
    <span>Media</span>
  </a>
  <a href="#" style="{{ practiceStyle }}">
    <span style="{{ practiceIconStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></span>
    <span>Practice exams</span>
  </a>

  <div style="display: flex; align-items: center; gap: 8px; margin: 8px 0; padding: 8px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--background);">
    <a href="#" style="display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; color: var(--muted-foreground); text-decoration: none;" style-hover="color: var(--brand)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
      View live site
    </a>
  </div>

  <div style="margin-top: auto; display: flex; flex-direction: column; gap: 4px; padding-top: 12px; border-top: 1px solid var(--border);">
    <div style="display: flex; align-items: center; gap: 8px; padding: 6px 8px;">
      <span style="display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 999px; background: var(--secondary); font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--muted-foreground);">SB</span>
      <div style="display: flex; flex-direction: column; min-width: 0;">
        <span style="font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">The Author</span>
        <span style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground);">owner</span>
      </div>
    </div>
    <a href="#" style="display: inline-flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: calc(var(--radius) - 4px); font-size: 13px; color: var(--muted-foreground); text-decoration: none;" style-hover="background: var(--accent); color: var(--foreground)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      Sign out
    </a>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 224, &quot;height&quot;: 600}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;, &quot;posts&quot;, &quot;media&quot;, &quot;practice&quot;], &quot;default&quot;: &quot;dashboard&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'dashboard';
    const base = { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 10px', borderRadius: 'calc(var(--radius) - 4px)', fontSize: '14px', textDecoration: 'none' };
    const mk = (k) => {
      const on = k === active;
      return on
        ? { ...base, background: 'color-mix(in oklch, var(--brand) 10%, transparent)', color: 'var(--brand)', fontWeight: 500 }
        : { ...base, color: 'var(--muted-foreground)' };
    };
    const ico = (k) => ({ display: 'inline-flex', color: k === active ? 'var(--brand)' : 'var(--muted-foreground)' });
    return {
      dashStyle: mk('dashboard'), postsStyle: mk('posts'), mediaStyle: mk('media'), practiceStyle: mk('practice'),
      dashIconStyle: ico('dashboard'), postsIconStyle: ico('posts'), mediaIconStyle: ico('media'), practiceIconStyle: ico('practice'),
    };
  }
}
</script>
</body>
</html>
