<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display: flex; width: 100%; min-height: 100%; background: var(--background); color: var(--foreground); font-family: var(--font-sans);">

  <sc-if value="{{ desktop }}" hint-placeholder-val="{{ true }}">
    <dc-import name="AdminShell" active="practice" hint-size="224px,100%"></dc-import>
  </sc-if>

  <div style="flex: 1 1 0; min-width: 0; display: flex; flex-direction: column;">

    <sc-if value="{{ mobile }}" hint-placeholder-val="{{ false }}">
      <header style="position: sticky; top: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: color-mix(in oklch, var(--background) 85%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);">
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="font-family: var(--font-mono); font-weight: 600; font-size: 15px;">study<span style="color: var(--brand);">blog</span></span>
          <span style="font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-foreground); border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px;">admin</span>
        </div>
        <button aria-label="Menu" style="display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--background); color: var(--foreground);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
      </header>
    </sc-if>

    <div style="display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding: 22px 24px 18px; border-bottom: 1px solid var(--border);">
      <div>
        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); margin-bottom: 6px;">Admin / Practice exams</div>
        <h1 style="font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 0;">Log a practice test</h1>
      </div>
      <a href="#" style="display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 13px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--background); color: var(--foreground); font-size: 13px; font-weight: 500; text-decoration: none;" style-hover="background: var(--accent)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>View public chart</a>
    </div>

    <div style="padding: 24px; display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start;">

      <!-- FORM -->
      <div style="flex: 1 1 380px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px;">
        <div style="display: flex; flex-direction: column; gap: 16px;">

          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 13px; font-weight: 500;">Which exam <span style="color: var(--destructive);">*</span></label>
            <div style="{{ selStyle }}">CompTIA A+ — Core 1 (220-1201)<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted-foreground); margin-left: auto;"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
          </div>

          <div style="display: flex; flex-wrap: wrap; gap: 14px;">
            <div style="flex: 1 1 180px; display: flex; flex-direction: column; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500;">Practice test name <span style="color: var(--destructive);">*</span></label>
              <input value="Dion Practice Test 3" style="{{ inputStyle }}">
            </div>
            <div style="flex: 1 1 180px; display: flex; flex-direction: column; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500;">Provider</label>
              <div style="{{ selStyle }}">Jason Dion · Udemy<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted-foreground); margin-left: auto;"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
            </div>
          </div>

          <!-- DATE PICKER (shadcn) -->
          <div style="display: flex; flex-wrap: wrap; gap: 14px;">
            <div style="flex: 1 1 200px; display: flex; flex-direction: column; gap: 6px; position: relative;">
              <label style="font-size: 13px; font-weight: 500;">Date taken <span style="color: var(--destructive);">*</span></label>
              <button style="display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; border: 1px solid var(--brand); border-radius: calc(var(--radius) - 2px); background: var(--background); font-family: var(--font-sans); font-size: 14px; color: var(--foreground); cursor: pointer; box-shadow: 0 0 0 2px var(--background), 0 0 0 4px color-mix(in oklch, var(--brand) 30%, transparent);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted-foreground);"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Jun 26, 2026</button>

              <!-- CALENDAR POPOVER -->
              <div style="position: absolute; top: 70px; left: 0; z-index: 10; width: 268px; background: var(--popover); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 1px 2px rgb(0 0 0 / 0.05), 0 8px 24px -8px rgb(0 0 0 / 0.18); padding: 14px;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                  <button aria-label="Previous month" style="display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 4px); background: var(--background); color: var(--muted-foreground); cursor: pointer;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                  <span style="font-size: 13px; font-weight: 600;">June 2026</span>
                  <button aria-label="Next month" style="display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 4px); background: var(--background); color: var(--muted-foreground); cursor: pointer;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;">
                  <sc-for list="{{ dow }}" as="d" hint-placeholder-count="7">
                    <div style="text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); padding: 3px 0;">{{ d }}</div>
                  </sc-for>
                  <sc-for list="{{ days }}" as="day" hint-placeholder-count="30">
                    <div style="{{ day.style }}">{{ day.n }}</div>
                  </sc-for>
                </div>
              </div>
            </div>

            <div style="flex: 1 1 120px; display: flex; flex-direction: column; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500;">Score % <span style="color: var(--destructive);">*</span></label>
              <div style="display: flex; align-items: center; height: 36px; padding: 0 12px; border: 1px solid var(--input); border-radius: calc(var(--radius) - 2px); background: var(--background);">
                <input value="85" style="flex: 1; border: none; outline: none; background: transparent; font-family: var(--font-mono); font-size: 14px; color: var(--foreground); min-width: 0;">
                <span style="font-family: var(--font-mono); font-size: 13px; color: var(--muted-foreground);">%</span>
              </div>
            </div>
          </div>

          <!-- OPTIONAL DETAIL -->
          <div style="border-top: 1px dashed var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 16px;">
            <div style="font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-foreground);">Optional · richer proof of work</div>
            <div style="display: flex; flex-wrap: wrap; gap: 14px;">
              <div style="flex: 1 1 150px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 500;">Scaled score</label>
                <input value="765 / 900" style="{{ inputStyle }}">
              </div>
              <div style="flex: 1 1 150px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 500;">Questions correct</label>
                <input value="77 / 90" style="{{ inputStyle }}">
              </div>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 14px;">
              <div style="flex: 1 1 150px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 500;">Time spent</label>
                <input value="74 min" style="{{ inputStyle }}">
              </div>
              <div style="flex: 1 1 150px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 500;">Weakest domain</label>
                <div style="{{ selStyle }}">Troubleshooting<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted-foreground); margin-left: auto;"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
              </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="font-size: 13px; font-weight: 500;">Notes</label>
              <textarea rows="2" placeholder="What dragged the score, what to drill next…" style="resize: none; padding: 8px 12px; border: 1px solid var(--input); border-radius: calc(var(--radius) - 2px); background: var(--background); font-family: var(--font-sans); font-size: 13px; line-height: 1.5; color: var(--foreground); outline: none;">Troubleshooting flowcharts still slow me down — drilling those before the real exam.</textarea>
            </div>
          </div>

          <div style="display: flex; align-items: center; gap: 10px; padding-top: 4px;">
            <button style="height: 38px; padding: 0 18px; border: none; border-radius: calc(var(--radius) - 2px); background: var(--primary); color: var(--primary-foreground); font-size: 14px; font-weight: 500; cursor: pointer;" style-hover="opacity: 0.9">Save attempt</button>
            <button style="height: 38px; padding: 0 14px; border: 1px solid var(--border); border-radius: calc(var(--radius) - 2px); background: var(--background); color: var(--foreground); font-size: 14px; font-weight: 500; cursor: pointer;" style-hover="background: var(--accent)">Save &amp; add another</button>
          </div>
        </div>
      </div>

      <!-- RECENT ATTEMPTS -->
      <div style="flex: 1 1 300px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;">
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border);">
          <h2 style="font-size: 15px; font-weight: 600; margin: 0;">Recent attempts</h2>
          <span style="font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground);">9 logged</span>
        </div>
        <sc-for list="{{ recent }}" as="r" hint-placeholder-count="5">
          <div style="display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border);">
            <span style="{{ r.scoreStyle }}">{{ r.score }}</span>
            <div style="min-width: 0; flex: 1;">
              <div style="font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ r.test }}</div>
              <div style="font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); margin-top: 2px;">{{ r.meta }}</div>
            </div>
            <button aria-label="Row actions" style="display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border: none; background: transparent; color: var(--muted-foreground); cursor: pointer; flex-shrink: 0;" style-hover="color: var(--foreground)"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="12" cy="19" r="1.6"></circle></svg></button>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1080, &quot;height&quot;: 760}, &quot;mobile&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const m = !!this.props.mobile;
    const inputStyle = { height: '36px', padding: '0 12px', border: '1px solid var(--input)', borderRadius: 'calc(var(--radius) - 2px)', background: 'var(--background)', fontFamily: 'var(--font-sans)', fontSize: '14px', color: 'var(--foreground)', outline: 'none', width: '100%' };
    const selStyle = { display: 'flex', alignItems: 'center', height: '36px', padding: '0 12px', border: '1px solid var(--input)', borderRadius: 'calc(var(--radius) - 2px)', background: 'var(--background)', fontSize: '14px', color: 'var(--foreground)' };

    const dow = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    // June 2026 starts on a Monday → 1 leading blank
    const days = [];
    days.push({ n: '', style: {} });
    for (let n = 1; n <= 30; n++) {
      const sel = n === 26;
      days.push({
        n: String(n),
        style: {
          textAlign: 'center', fontSize: '12px', padding: '6px 0', borderRadius: 'calc(var(--radius) - 4px)', cursor: 'pointer',
          ...(sel
            ? { background: 'var(--brand)', color: 'var(--brand-foreground)', fontWeight: 600 }
            : { color: 'var(--foreground)' }),
        },
      });
    }

    const pill = (s, pass) => ({ flexShrink: 0, fontFamily: 'var(--font-mono)', fontSize: '13px', fontWeight: 600, width: '38px', color: pass ? 'var(--chart-2)' : 'var(--foreground)' });
    const recent = [
      { score: '85%', test: 'Dion Practice Test 3', meta: 'A+ Core 1 · Jun 26', pass: false },
      { score: '78%', test: 'CertMaster Practice', meta: 'A+ Core 2 · Jun 27', pass: false },
      { score: '82%', test: 'Dion Practice Test 2', meta: 'Security+ · Jun 24', pass: false },
      { score: '81%', test: 'Pop Quiz Set A', meta: 'A+ Core 1 · Jun 18', pass: false },
      { score: '76%', test: 'Pop Quiz Set B', meta: 'Security+ · Jun 10', pass: false },
    ].map((r) => ({ ...r, scoreStyle: pill(r.score, r.pass) }));

    return { desktop: !m, mobile: m, inputStyle, selStyle, dow, days, recent };
  }
}
</script>
</body>
</html>
